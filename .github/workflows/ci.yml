name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          pip install -e .
          pip install pytest

      - name: Run tests
        run: |
          pytest -q
