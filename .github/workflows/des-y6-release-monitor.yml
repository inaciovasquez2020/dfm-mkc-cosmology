name: DES Y6 Release Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * 1"

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run DES Y6 release monitor
        run: |
          python3 tools/check_des_y6_release_monitor.py \
            --output artifacts/des_y6_release_monitor/latest.json
          cat artifacts/des_y6_release_monitor/latest.json
      - name: Upload monitor artifact
        uses: actions/upload-artifact@v4
        with:
          name: des-y6-release-monitor-latest
          path: artifacts/des_y6_release_monitor/latest.json
